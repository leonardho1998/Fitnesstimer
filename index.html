<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Fitnesstimer</title>
<style>
  :root {
    --bg:        #0f0f0f;
    --surface:   #1a1a1a;
    --surface2:  #242424;
    --border:    #2e2e2e;
    --text:      #f0f0f0;
    --muted:     #888;
    --green:     #22c55e;
    --green-dim: #166534;
    --red:       #ef4444;
    --red-dim:   #7f1d1d;
    --amber:     #f59e0b;
    --blue:      #3b82f6;
    --radius:    14px;
    --font:      -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;

    /* Phase background colors */
    --phase-bg-prep:     #c97400;
    --phase-bg-exercise: #16a34a;
    --phase-bg-pause:    #dc2626;
    --phase-text:        #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
    position: relative;
  }
  .tab-btn {
    flex: 1;
    padding: 14px 0 12px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color .15s;
  }
  .tab-btn .icon { font-size: 20px; }
  .tab-btn.active { color: var(--text); }

  /* ── PAGES ── */
  .page { display: none; flex: 1; overflow-y: auto; }
  .page.active { display: flex; flex-direction: column; }

  /* ── TIMER PAGE layout ── */
  #page-timer {
    overflow: hidden;
  }

  /* Top bar: profile selector — always dark */
  .timer-top-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .timer-top-bar .card-title { margin-bottom: 8px; }

  /* Phase area — full bleed color block */
  .phase-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 14px 20px 0;
    transition: background .35s ease;
    overflow: hidden;
  }
  .phase-area.phase-idle     { background: var(--bg); }
  .phase-area.phase-prep     { background: var(--phase-bg-prep); }
  .phase-area.phase-exercise { background: var(--phase-bg-exercise); }
  .phase-area.phase-pause    { background: var(--phase-bg-pause); }

  /* Text colors flip when active */
  .phase-area.phase-prep .active-text,
  .phase-area.phase-exercise .active-text,
  .phase-area.phase-pause .active-text { color: var(--phase-text) !important; }

  .phase-area.phase-prep .muted-text,
  .phase-area.phase-exercise .muted-text,
  .phase-area.phase-pause .muted-text { color: rgba(0,0,0,.55) !important; }

  /* ── WORKOUT REMAINING BAR (top of phase area) ── */
  .workout-remaining {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .workout-remaining-ring {
    position: relative;
    width: 44px;
    height: 44px;
    flex-shrink: 0;
  }
  .workout-remaining-ring svg {
    position: absolute;
    top: 0; left: 0;
    transform: rotate(-90deg);
  }
  .wr-bg { fill: none; stroke: rgba(0,0,0,.2); stroke-width: 4; }
  .wr-fg { fill: none; stroke: rgba(0,0,0,.6); stroke-width: 4; stroke-linecap: round;
           transition: stroke-dashoffset 1s linear; }
  .workout-remaining-ring .wr-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: rgba(0,0,0,.7);
    line-height: 1;
    text-align: center;
  }
  .workout-remaining-info { flex: 1; }
  .workout-remaining-info .wr-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
    color: rgba(0,0,0,.5);
  }
  .workout-remaining-info .wr-time {
    font-size: 20px; font-weight: 300; font-variant-numeric: tabular-nums;
    color: rgba(0,0,0,.8);
  }

  /* ── PHASE LABEL & EXERCISE NAME ── */
  .timer-phase-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
    margin-bottom: 4px;
    min-height: 16px;
    align-self: flex-start;
  }
  .timer-exercise-name {
    font-size: 24px;
    font-weight: 800;
    text-align: center;
    line-height: 1.15;
    min-height: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    color: var(--text);
    margin-bottom: 8px;
  }

  /* ── MAIN RING ── */
  .timer-ring-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 4px 0 8px;
  }
  .timer-ring-wrap svg {
    position: absolute;
    top: 0; left: 0;
    transform: rotate(-90deg);
  }
  .ring-track { fill: none; stroke: rgba(0,0,0,.18); stroke-width: 12; }
  .ring-fill  { fill: none; stroke: rgba(0,0,0,.7); stroke-width: 12; stroke-linecap: round;
                transition: stroke-dashoffset .95s linear; }
  .timer-number {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  .timer-mmss {
    font-size: 54px;
    font-weight: 200;
    line-height: 1;
    letter-spacing: -.02em;
    font-variant-numeric: tabular-nums;
    color: rgba(0,0,0,.85);
  }
  .timer-mmss-idle { color: var(--text); }

  /* ── META ROW ── */
  .timer-meta {
    display: flex;
    gap: 20px;
    margin-bottom: 6px;
  }
  .timer-meta-item { text-align: center; }
  .timer-meta-item .val {
    font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .timer-meta-item .lbl {
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .06em;
  }

  .timer-next {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    min-height: 18px;
    padding: 0 8px;
  }
  .timer-next span { color: var(--text); font-weight: 500; }

  /* ── CONTROLS ── */
  .timer-controls-wrap {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px 20px;
    flex-shrink: 0;
  }
  .timer-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn-abort { grid-column: 1 / -1; }

  /* ── IDLE STATE ── */
  .idle-hint {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--muted);
    font-size: 14px;
    gap: 8px;
    padding: 32px 0 40px;
  }
  .idle-hint .big { font-size: 52px; }

  /* ── START BUTTON ── */
  .start-btn-wrap {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px 20px;
    flex-shrink: 0;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── BUTTONS ── */
  .btn {
    border: none;
    border-radius: 10px;
    font-family: var(--font);
    font-weight: 600;
    cursor: pointer;
    transition: opacity .12s, transform .1s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:active { opacity: .75; transform: scale(.97); }
  .btn-lg { padding: 16px 24px; font-size: 17px; width: 100%; border-radius: 12px; min-height: 54px; }
  .btn-sm { padding: 10px 16px; font-size: 14px; min-height: 44px; }
  .btn-green  { background: var(--green);  color: #000; }
  .btn-red    { background: var(--red);    color: #fff; }
  .btn-amber  { background: var(--amber);  color: #000; }
  .btn-blue   { background: var(--blue);   color: #fff; }
  .btn-ghost  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red-dim); }

  /* ── PROFILE SELECT ── */
  .profile-select-wrap { position: relative; }
  .profile-select-wrap select {
    width: 100%;
    padding: 12px 40px 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    font-family: var(--font);
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    min-height: 48px;
  }
  .profile-select-wrap::after {
    content: "▾";
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* ── FINISH OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .overlay.visible { display: flex; }
  .overlay-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    width: 100%;
    max-width: 340px;
  }
  .overlay-icon  { font-size: 56px; margin-bottom: 12px; }
  .overlay-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .overlay-sub   { color: var(--muted); font-size: 15px; margin-bottom: 24px; }
  .overlay-stat  { font-size: 36px; font-weight: 300; color: var(--green); margin-bottom: 4px; }
  .overlay-stat-lbl { font-size: 12px; color: var(--muted); text-transform: uppercase;
                      letter-spacing: .08em; margin-bottom: 24px; }

  /* ── PROFILES PAGE ── */
  #page-profiles { overflow-y: auto; padding: 20px 16px 32px; gap: 16px; }
  .profile-list { display: flex; flex-direction: column; gap: 10px; }
  .profile-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .profile-item.selected { border-color: var(--green); }
  .profile-item-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .profile-item.selected .profile-item-dot { background: var(--green); }
  .profile-item-name { font-weight: 600; flex: 1; }
  .profile-item-meta { font-size: 12px; color: var(--muted); }
  .profile-item-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    cursor: pointer;
    color: var(--text);
  }
  .icon-btn:active { opacity: .6; }

  /* ── EDITOR ── */
  .editor-section { display: flex; flex-direction: column; gap: 14px; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  input[type=text], input[type=number] {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    font-family: var(--font);
    min-height: 48px;
    outline: none;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--blue); }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    min-height: 48px;
  }
  .toggle-label { font-size: 16px; }
  .toggle { position: relative; width: 51px; height: 31px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 15px;
    transition: background .2s;
  }
  .toggle input:checked + .toggle-track { background: var(--green); }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 25px; height: 25px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s;
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

  .exercise-list { display: flex; flex-direction: column; gap: 8px; }
  .exercise-row {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .exercise-row-top { display: flex; align-items: center; gap: 8px; }
  .exercise-row-top input[type=text] { flex: 1; min-height: 40px; padding: 8px 12px; }
  .exercise-row-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .exercise-row-bottom input { min-height: 40px; padding: 8px 12px; font-size: 15px; }
  .exercise-mini-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .drag-handle { color: var(--muted); font-size: 18px; cursor: grab; padding: 4px; touch-action: none; }
  .btn-add-exercise {
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 14px;
    font-family: var(--font);
    padding: 12px;
    width: 100%;
    cursor: pointer;
    min-height: 48px;
    transition: color .15s, border-color .15s;
  }
  .btn-add-exercise:active { color: var(--text); border-color: var(--text); }
  .editor-footer { display: flex; gap: 10px; padding-top: 4px; }

  /* ── UTIL ── */
  .divider { height: 1px; background: var(--border); }
  .section-title { font-size: 19px; font-weight: 700; }
  .empty-state { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }

  @media (prefers-reduced-motion: reduce) {
    .ring-fill, .wr-fg, .phase-area { transition: none; }
  }
</style>
</head>
<body>

<!-- ── TAB BAR ── -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('timer')" id="tab-timer">
    <span class="icon">▶︎</span>
    <span>Timer</span>
  </button>
  <button class="tab-btn" onclick="showTab('profiles')" id="tab-profiles">
    <span class="icon">⚙︎</span>
    <span>Profile</span>
  </button>
</div>

<!-- ══ TIMER PAGE ══ -->
<div class="page active" id="page-timer">

  <!-- Profile selector — always dark -->
  <div class="timer-top-bar">
    <div class="card-title">Workout-Profil</div>
    <div class="profile-select-wrap">
      <select id="timer-profile-select" onchange="onProfileSelectChange()"></select>
    </div>
  </div>

  <!-- Phase area (color changes) -->
  <div class="phase-area phase-idle" id="phase-area">

    <!-- IDLE -->
    <div class="idle-hint" id="timer-idle">
      <div class="big">🏋️</div>
      <div>Profil wählen und starten</div>
    </div>

    <!-- ACTIVE -->
    <div id="timer-active" style="display:none; width:100%; display:none; flex-direction:column; align-items:center;">

      <!-- Workout-Restzeit oben -->
      <div class="workout-remaining">
        <div class="workout-remaining-ring">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle class="wr-bg" cx="22" cy="22" r="18"/>
            <circle class="wr-fg" id="wr-ring" cx="22" cy="22" r="18"
              stroke-dasharray="113" stroke-dashoffset="0"/>
          </svg>
          <div class="wr-text" id="wr-pct">100%</div>
        </div>
        <div class="workout-remaining-info">
          <div class="wr-label">Workout Restzeit</div>
          <div class="wr-time active-text" id="wr-time">–</div>
        </div>
        <div class="timer-meta">
          <div class="timer-meta-item">
            <div class="val active-text" id="t-round">–</div>
            <div class="lbl muted-text">Runde</div>
          </div>
          <div class="timer-meta-item">
            <div class="val active-text" id="t-ex-count">–</div>
            <div class="lbl muted-text">Übung</div>
          </div>
        </div>
      </div>

      <!-- Phase label -->
      <div class="timer-phase-label muted-text" id="t-phase-label"></div>

      <!-- Exercise name -->
      <div class="timer-exercise-name active-text" id="t-exercise-name"></div>

      <!-- Main ring -->
      <div class="timer-ring-wrap">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle class="ring-track" cx="100" cy="100" r="88"/>
          <circle class="ring-fill"  id="t-ring" cx="100" cy="100" r="88"
            stroke-dasharray="553" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-number">
          <div class="timer-mmss active-text" id="t-mmss">0:00</div>
        </div>
      </div>

      <!-- Next hint -->
      <div class="timer-next muted-text" id="t-next"></div>

    </div><!-- /timer-active -->
  </div><!-- /phase-area -->

  <!-- Controls — always dark, below phase area -->
  <div id="timer-controls-wrap" style="display:none">
    <div class="timer-controls-wrap">
      <div class="timer-controls">
        <button class="btn btn-lg btn-amber" id="btn-pauseresume" onclick="togglePause()">Pause</button>
        <button class="btn btn-lg btn-ghost" onclick="skipExercise()">Überspringen</button>
        <button class="btn btn-lg btn-danger btn-abort" onclick="abortTimer()">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Start button -->
  <div id="start-btn-wrap" class="start-btn-wrap">
    <button class="btn btn-lg btn-green" id="btn-start" onclick="startTimer()">▶  Start</button>
  </div>

</div>

<!-- ══ PROFILES PAGE ══ -->
<div class="page" id="page-profiles">

  <div style="display:flex; align-items:center; justify-content:space-between;">
    <div class="section-title">Profile</div>
    <button class="btn btn-sm btn-blue" onclick="newProfile()">+ Neu</button>
  </div>

  <div class="profile-list" id="profile-list"></div>

  <div class="card" id="editor-card" style="display:none">
    <div class="card-title" id="editor-title">Profil bearbeiten</div>
    <div class="editor-section">

      <div class="field-group">
        <div class="field-label">Name</div>
        <input type="text" id="ed-name" placeholder="z.B. HIIT">
      </div>

      <div class="row-2">
        <div class="field-group">
          <div class="field-label">Runden</div>
          <input type="number" id="ed-rounds" min="1" max="99" value="3">
        </div>
        <div class="field-group">
          <div class="field-label">Vorbereitung (s)</div>
          <input type="number" id="ed-prep" min="0" max="60" value="5">
        </div>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">🔔 Tonsignal</span>
        <label class="toggle">
          <input type="checkbox" id="ed-sound" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="divider"></div>

      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
        <div class="card-title" style="margin:0">Übungen</div>
      </div>

      <div class="exercise-list" id="ed-exercise-list"></div>
      <button class="btn-add-exercise" onclick="addExercise()">+ Übung hinzufügen</button>

      <div class="editor-footer">
        <button class="btn btn-sm btn-ghost" style="flex:1" onclick="cancelEdit()">Abbrechen</button>
        <button class="btn btn-sm btn-green" style="flex:2" onclick="saveProfile()">Speichern</button>
      </div>
    </div>
  </div>

</div>

<!-- ── FINISH OVERLAY ── -->
<div class="overlay" id="finish-overlay">
  <div class="overlay-card">
    <div class="overlay-icon">🎉</div>
    <div class="overlay-title">Workout abgeschlossen!</div>
    <div class="overlay-sub" id="finish-profile-name"></div>
    <div class="overlay-stat" id="finish-duration"></div>
    <div class="overlay-stat-lbl">Gesamtdauer</div>
    <button class="btn btn-lg btn-green" onclick="closeFinish()">OK</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════
const PROFILES_KEY = 'ft_profiles';
const ACTIVE_KEY   = 'ft_active_profile';

function loadProfiles() {
  try { return JSON.parse(localStorage.getItem(PROFILES_KEY)) || {}; } catch { return {}; }
}
function saveProfiles(p) { localStorage.setItem(PROFILES_KEY, JSON.stringify(p)); }
function loadActive()    { return localStorage.getItem(ACTIVE_KEY) || null; }
function saveActive(id)  { localStorage.setItem(ACTIVE_KEY, id); }

// ════════════════════════════════════════
//  TAB NAVIGATION
// ════════════════════════════════════════
function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'timer')    renderTimerTab();
  if (name === 'profiles') renderProfilesTab();
}

// ════════════════════════════════════════
//  TIMER TAB
// ════════════════════════════════════════
function renderTimerTab() {
  const profiles = loadProfiles();
  const sel = document.getElementById('timer-profile-select');
  const activeId = loadActive();
  sel.innerHTML = '';

  const ids = Object.keys(profiles);
  if (ids.length === 0) {
    sel.innerHTML = '<option value="">– Noch keine Profile –</option>';
    document.getElementById('start-btn-wrap').style.display = 'none';
    return;
  }
  ids.forEach(id => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = profiles[id].name;
    if (id === activeId) opt.selected = true;
    sel.appendChild(opt);
  });
  document.getElementById('start-btn-wrap').style.display = '';
}

function onProfileSelectChange() {
  saveActive(document.getElementById('timer-profile-select').value);
}

// ════════════════════════════════════════
//  WORKOUT TOTAL DURATION CALC
// ════════════════════════════════════════
function calcWorkoutTotal(profile) {
  // prep + (exercises + pauses) * rounds
  let perRound = 0;
  profile.exercises.forEach(ex => { perRound += ex.duration + (ex.pause || 0); });
  return (profile.prepTime || 0) + perRound * profile.rounds;
}

function calcRemainingFromState(s) {
  // remaining = total - elapsed in current phase - future phases
  let remaining = 0;
  // rest of current phase
  remaining += s.secondsLeft;
  // rest of current round (exercises after current)
  if (s.phase === 'exercise') {
    const ex = s.profile.exercises[s.exIdx];
    remaining += (ex.pause || 0); // pause after this exercise
    for (let i = s.exIdx + 1; i < s.profile.exercises.length; i++) {
      remaining += s.profile.exercises[i].duration + (s.profile.exercises[i].pause || 0);
    }
  } else if (s.phase === 'pause') {
    // after this pause: remaining exercises in current round
    for (let i = s.exIdx + 1; i < s.profile.exercises.length; i++) {
      remaining += s.profile.exercises[i].duration + (s.profile.exercises[i].pause || 0);
    }
  } else if (s.phase === 'prep') {
    // all rounds
    let perRound = 0;
    s.profile.exercises.forEach(ex => { perRound += ex.duration + (ex.pause || 0); });
    remaining += perRound * s.profile.rounds;
    return remaining;
  }
  // future rounds
  let perRound = 0;
  s.profile.exercises.forEach(ex => { perRound += ex.duration + (ex.pause || 0); });
  remaining += perRound * (s.profile.rounds - s.round);
  return remaining;
}

// ════════════════════════════════════════
//  TIMER LOGIC
// ════════════════════════════════════════
let timerState = null;

function startTimer() {
  const profiles = loadProfiles();
  const id = document.getElementById('timer-profile-select').value;
  if (!id || !profiles[id]) return;
  const profile = JSON.parse(JSON.stringify(profiles[id]));
  if (!profile.exercises || profile.exercises.length === 0) {
    alert('Dieses Profil hat keine Übungen.'); return;
  }

  const workoutTotal = calcWorkoutTotal(profile);

  timerState = {
    profile,
    phase: 'prep',
    exIdx: 0,
    round: 1,
    secondsLeft:   profile.prepTime > 0 ? profile.prepTime : 0,
    phaseDuration: profile.prepTime > 0 ? profile.prepTime : 0,
    totalSeconds:  0,
    workoutTotal,
    intervalId: null,
  };

  document.getElementById('timer-idle').style.display         = 'none';
  document.getElementById('timer-active').style.display       = 'flex';
  document.getElementById('timer-controls-wrap').style.display = '';
  document.getElementById('start-btn-wrap').style.display     = 'none';
  document.getElementById('timer-profile-select').disabled    = true;

  if (profile.prepTime > 0) {
    setPhase('prep');
  } else {
    beginExercise();
  }
  timerState.intervalId = setInterval(tick, 1000);
}

function tick() {
  if (!timerState) return;
  timerState.totalSeconds++;
  timerState.secondsLeft--;
  updateAllDisplays();
  if (timerState.secondsLeft <= 0) {
    nextPhase();
  } else if (timerState.secondsLeft <= 3) {
    beep('countdown');
  }
}

function nextPhase() {
  const s = timerState;
  if (s.phase === 'prep') {
    beginExercise();
  } else if (s.phase === 'exercise') {
    const ex = s.profile.exercises[s.exIdx];
    if (ex.pause > 0) beginPause(ex.pause);
    else advanceExercise();
  } else if (s.phase === 'pause') {
    advanceExercise();
  }
}

function beginExercise() {
  const ex = timerState.profile.exercises[timerState.exIdx];
  setPhase('exercise', ex.duration);
  beep('exercise');
}

function beginPause(duration) {
  setPhase('pause', duration);
  beep('pause');
}

function advanceExercise() {
  const s = timerState;
  s.exIdx++;
  if (s.exIdx >= s.profile.exercises.length) {
    if (s.round >= s.profile.rounds) { finishWorkout(); return; }
    s.round++;
    s.exIdx = 0;
  }
  beginExercise();
}

function setPhase(phase, duration) {
  const s = timerState;
  s.phase = phase;
  if (duration !== undefined) {
    s.secondsLeft   = duration;
    s.phaseDuration = duration;
  }
  // Background color
  const area = document.getElementById('phase-area');
  area.className = `phase-area phase-${phase}`;

  updateAllDisplays();
}

function fmtMmSs(secs) {
  secs = Math.max(0, secs);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function updateAllDisplays() {
  const s = timerState;
  if (!s) return;
  const ex = s.profile.exercises[s.exIdx] || {};

  // Phase label & exercise name
  const phaseLabel = document.getElementById('t-phase-label');
  const exName     = document.getElementById('t-exercise-name');
  if (s.phase === 'prep') {
    phaseLabel.textContent = 'Vorbereitung';
    exName.textContent = s.profile.exercises[0]?.name || '';
  } else if (s.phase === 'exercise') {
    phaseLabel.textContent = 'Übung';
    exName.textContent = ex.name || '';
  } else {
    phaseLabel.textContent = 'Pause';
    const next = s.profile.exercises[s.exIdx + 1] ||
                 (s.round < s.profile.rounds ? s.profile.exercises[0] : null);
    exName.textContent = next ? `→ ${next.name}` : '→ Letzte Runde endet';
  }

  // Main ring & MM:SS
  const pct = s.phaseDuration > 0 ? s.secondsLeft / s.phaseDuration : 0;
  const circ = 553;
  document.getElementById('t-ring').style.strokeDashoffset = circ * (1 - pct);
  document.getElementById('t-mmss').textContent = fmtMmSs(s.secondsLeft);

  // Round / exercise
  document.getElementById('t-round').textContent    = `${s.round}/${s.profile.rounds}`;
  document.getElementById('t-ex-count').textContent = `${s.exIdx + 1}/${s.profile.exercises.length}`;

  // Next hint
  const nextEl = document.getElementById('t-next');
  if (s.phase === 'exercise') {
    const nextEx = s.profile.exercises[s.exIdx + 1];
    if (nextEx) nextEl.innerHTML = `Nächste: <span>${nextEx.name}</span>`;
    else if (s.round < s.profile.rounds) nextEl.innerHTML = `Nächste Runde: <span>${s.profile.exercises[0].name}</span>`;
    else nextEl.innerHTML = `<span>Letzte Übung!</span>`;
  } else {
    nextEl.innerHTML = '';
  }

  // Workout remaining ring
  const remaining   = calcRemainingFromState(s);
  const totalPct    = s.workoutTotal > 0 ? remaining / s.workoutTotal : 0;
  const wrCirc      = 113;
  document.getElementById('wr-ring').style.strokeDashoffset = wrCirc * (1 - totalPct);
  document.getElementById('wr-pct').textContent  = Math.round(totalPct * 100) + '%';
  document.getElementById('wr-time').textContent = fmtMmSs(remaining);
}

function togglePause() {
  if (!timerState) return;
  if (timerState.intervalId) {
    clearInterval(timerState.intervalId);
    timerState.intervalId = null;
    document.getElementById('btn-pauseresume').textContent = 'Fortsetzen';
    document.getElementById('btn-pauseresume').className   = 'btn btn-lg btn-green';
  } else {
    timerState.intervalId = setInterval(tick, 1000);
    document.getElementById('btn-pauseresume').textContent = 'Pause';
    document.getElementById('btn-pauseresume').className   = 'btn btn-lg btn-amber';
  }
}

function skipExercise() {
  if (!timerState) return;
  if (timerState.phase === 'exercise') {
    const ex = timerState.profile.exercises[timerState.exIdx];
    if (ex.pause > 0) beginPause(ex.pause);
    else advanceExercise();
  } else if (timerState.phase === 'pause') {
    advanceExercise();
  }
}

function abortTimer() {
  if (!timerState) return;
  if (!confirm('Workout abbrechen?')) return;
  stopTimer();
  resetTimerUI();
}

function stopTimer() {
  if (timerState?.intervalId) clearInterval(timerState.intervalId);
  timerState = null;
}

function resetTimerUI() {
  document.getElementById('timer-idle').style.display          = '';
  document.getElementById('timer-active').style.display        = 'none';
  document.getElementById('timer-controls-wrap').style.display = 'none';
  document.getElementById('start-btn-wrap').style.display      = '';
  document.getElementById('timer-profile-select').disabled     = false;
  document.getElementById('phase-area').className              = 'phase-area phase-idle';
  document.getElementById('btn-pauseresume').textContent       = 'Pause';
  document.getElementById('btn-pauseresume').className         = 'btn btn-lg btn-amber';
}

function finishWorkout() {
  const duration    = timerState.totalSeconds;
  const profileName = timerState.profile.name;
  beep('finish');
  stopTimer();
  resetTimerUI();
  document.getElementById('finish-duration').textContent     = fmtMmSs(duration);
  document.getElementById('finish-profile-name').textContent = profileName;
  document.getElementById('finish-overlay').classList.add('visible');
}

function closeFinish() {
  document.getElementById('finish-overlay').classList.remove('visible');
}

// ════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(type) {
  const profile = timerState?.profile || loadProfiles()[loadActive()];
  if (profile && !profile.sound) return;
  try {
    const ctx = getAudioCtx();
    const configs = {
      exercise:  [{ f: 880, t: 0,    d: 0.12 }, { f: 1047, t: 0.14, d: 0.12 }],
      pause:     [{ f: 440, t: 0,    d: 0.18 }],
      countdown: [{ f: 660, t: 0,    d: 0.08 }],
      finish:    [{ f: 523, t: 0,    d: 0.25 }, { f: 659, t: 0.30, d: 0.25 },
                  { f: 784, t: 0.60, d: 0.25 }, { f: 1047, t: 0.90, d: 0.55 }],
    };
    (configs[type] || configs.exercise).forEach(({ f, t, d }) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = f;
      osc.type = 'sine';
      const start = ctx.currentTime + t;
      gain.gain.setValueAtTime(0.35, start);
      gain.gain.exponentialRampToValueAtTime(0.001, start + d);
      osc.start(start); osc.stop(start + d + 0.05);
    });
  } catch(e) {}
}

// ════════════════════════════════════════
//  PROFILES TAB
// ════════════════════════════════════════
let editingId = null;

function renderProfilesTab() {
  const profiles = loadProfiles();
  const activeId = loadActive();
  const list     = document.getElementById('profile-list');
  const ids      = Object.keys(profiles);

  if (ids.length === 0) {
    list.innerHTML = '<div class="empty-state">Noch keine Profile.<br>Tippe auf „+ Neu" um zu starten.</div>';
  } else {
    list.innerHTML = '';
    ids.forEach(id => {
      const p    = profiles[id];
      const item = document.createElement('div');
      item.className = 'profile-item' + (id === activeId ? ' selected' : '');
      item.innerHTML = `
        <div class="profile-item-dot"></div>
        <div style="flex:1">
          <div class="profile-item-name">${escHtml(p.name)}</div>
          <div class="profile-item-meta">${p.exercises.length} Übungen · ${p.rounds} Runden</div>
        </div>
        <div class="profile-item-actions">
          <div class="icon-btn" onclick="selectProfile('${id}')">✓</div>
          <div class="icon-btn" onclick="editProfile('${id}')">✎</div>
          <div class="icon-btn" onclick="deleteProfile('${id}')" style="color:var(--red)">✕</div>
        </div>`;
      list.appendChild(item);
    });
  }
  document.getElementById('editor-card').style.display = 'none';
  editingId = null;
}

function selectProfile(id) { saveActive(id); renderProfilesTab(); }

function deleteProfile(id) {
  const profiles = loadProfiles();
  if (!profiles[id]) return;
  if (!confirm(`„${profiles[id].name}" löschen?`)) return;
  delete profiles[id];
  saveProfiles(profiles);
  if (loadActive() === id) saveActive(Object.keys(profiles)[0] || null);
  renderProfilesTab();
}

function newProfile() {
  editingId = null;
  document.getElementById('editor-title').textContent = 'Neues Profil';
  document.getElementById('ed-name').value    = '';
  document.getElementById('ed-rounds').value  = '3';
  document.getElementById('ed-prep').value    = '5';
  document.getElementById('ed-sound').checked = true;
  renderExerciseEditor([{ name: '', duration: 30, pause: 10 }]);
  document.getElementById('editor-card').style.display = '';
  document.getElementById('editor-card').scrollIntoView({ behavior: 'smooth' });
}

function editProfile(id) {
  const profiles = loadProfiles();
  const p = profiles[id];
  if (!p) return;
  editingId = id;
  document.getElementById('editor-title').textContent = 'Profil bearbeiten';
  document.getElementById('ed-name').value    = p.name;
  document.getElementById('ed-rounds').value  = p.rounds;
  document.getElementById('ed-prep').value    = p.prepTime;
  document.getElementById('ed-sound').checked = p.sound;
  renderExerciseEditor(p.exercises);
  document.getElementById('editor-card').style.display = '';
  document.getElementById('editor-card').scrollIntoView({ behavior: 'smooth' });
}

function renderExerciseEditor(exercises) {
  const list = document.getElementById('ed-exercise-list');
  list.innerHTML = '';
  exercises.forEach((ex, i) => list.appendChild(createExerciseRow(ex, i)));
}

function createExerciseRow(ex, i) {
  const row = document.createElement('div');
  row.className   = 'exercise-row';
  row.dataset.idx = i;
  row.innerHTML = `
    <div class="exercise-row-top">
      <span class="drag-handle" title="Ziehen zum Sortieren">⠿</span>
      <input type="text" placeholder="Übungsname" value="${escHtml(ex.name)}" data-field="name">
      <div class="icon-btn" onclick="removeExerciseRow(this)" style="color:var(--red);flex-shrink:0">✕</div>
    </div>
    <div class="exercise-row-bottom">
      <div>
        <input type="number" min="1" max="3600" value="${ex.duration}" data-field="duration" placeholder="30">
        <div class="exercise-mini-label">Dauer (s)</div>
      </div>
      <div>
        <input type="number" min="0" max="300" value="${ex.pause}" data-field="pause" placeholder="10">
        <div class="exercise-mini-label">Pause danach (s)</div>
      </div>
    </div>`;
  return row;
}

function addExercise() {
  const list = document.getElementById('ed-exercise-list');
  const row  = createExerciseRow({ name: '', duration: 30, pause: 10 }, list.children.length);
  list.appendChild(row);
  row.querySelector('input[data-field="name"]').focus();
}

function removeExerciseRow(btn) { btn.closest('.exercise-row').remove(); }

function readExercisesFromEditor() {
  return Array.from(document.querySelectorAll('#ed-exercise-list .exercise-row')).map(row => ({
    name:     row.querySelector('[data-field="name"]').value.trim(),
    duration: parseInt(row.querySelector('[data-field="duration"]').value) || 30,
    pause:    parseInt(row.querySelector('[data-field="pause"]').value)    || 0,
  }));
}

function saveProfile() {
  const name      = document.getElementById('ed-name').value.trim();
  const rounds    = parseInt(document.getElementById('ed-rounds').value) || 1;
  const prepTime  = parseInt(document.getElementById('ed-prep').value)   || 0;
  const sound     = document.getElementById('ed-sound').checked;
  const exercises = readExercisesFromEditor();

  if (!name)                             { alert('Bitte einen Namen eingeben.'); return; }
  if (exercises.length === 0)            { alert('Mindestens eine Übung erforderlich.'); return; }
  if (exercises.some(e => !e.name))      { alert('Alle Übungen brauchen einen Namen.'); return; }

  const profiles = loadProfiles();
  const id = editingId || 'p_' + Date.now();
  profiles[id] = { name, rounds, prepTime, sound, exercises };
  saveProfiles(profiles);
  if (!loadActive()) saveActive(id);
  renderProfilesTab();
  document.getElementById('page-profiles').scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
  document.getElementById('editor-card').style.display = 'none';
  editingId = null;
}

// ════════════════════════════════════════
//  DRAG-TO-SORT (touch)
// ════════════════════════════════════════
(function() {
  let dragging = null;
  document.addEventListener('touchstart', e => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    dragging = handle.closest('.exercise-row');
    dragging.style.opacity = '.4';
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const y    = e.touches[0].clientY;
    const list = document.getElementById('ed-exercise-list');
    const rows = Array.from(list.querySelectorAll('.exercise-row')).filter(r => r !== dragging);
    let after  = null;
    for (const r of rows) {
      if (y > r.getBoundingClientRect().top + r.offsetHeight / 2) after = r;
    }
    if (after) after.after(dragging);
    else if (rows[0]) rows[0].before(dragging);
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging.style.opacity = '';
    dragging = null;
  });
})();

// ════════════════════════════════════════
//  UTIL
// ════════════════════════════════════════
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── INIT ──
renderTimerTab();
</script>
